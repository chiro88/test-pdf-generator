<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>picker_cmc — web editor (read-only)</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <header id="toolbar">
    <span class="brand">picker_cmc editor <em>D24</em></span>
    <span class="toggles">
      <label><input type="checkbox" data-kind="figure" checked> Figures</label>
      <label><input type="checkbox" data-kind="table" checked> Tables</label>
      <label><input type="checkbox" data-kind="header" checked> Header</label>
      <label><input type="checkbox" data-kind="footer" checked> Footer</label>
      <label><input type="checkbox" data-kind="watermark" checked> Watermark</label>
      <button id="toggle-all" type="button">Toggle all</button>
    </span>
    <span class="modes">
      <button id="mode-view" type="button" class="active">View</button>
      <button id="mode-edit" type="button">Edit bbox</button>
      <button id="mode-ruler" type="button">Ruler</button>
      <select id="region-select" title="region to edit"></select>
    </span>
    <span class="save-tools">
      <span id="dirty-badge" class="clean">saved</span>
      <button id="save" type="button">Save</button>
      <button id="save-as" type="button">Save As…</button>
      <button id="export-pkg" type="button" title="downstream-package-v0">Export package</button>
    </span>
  </header>
  <div id="readout"></div>

  <main>
    <aside id="tree">
      <details id="setup-panel">
        <summary>Setup / run launcher</summary>
        <div class="setup-body">
          <button id="dl-template" type="button">Download template</button>
          <textarea id="setup-yaml" rows="6" placeholder="paste setup-yaml-v0 here (or load a template)"></textarea>
          <div class="setup-actions">
            <button id="setup-validate" type="button">Validate</button>
            <button id="setup-run" type="button">Run detector</button>
          </div>
          <div id="setup-msg" class="setup-msg"></div>
          <div class="runs"><b>Runs</b> <button id="runs-refresh" type="button">↻</button><ul id="runs-list"></ul></div>
        </div>
      </details>
      <div id="run-meta" class="meta"></div>
      <section><h3>Figures</h3><ul id="tree-figures"></ul></section>
      <section><h3>Tables</h3><ul id="tree-tables"></ul></section>
      <section><h3>Common regions</h3><ul id="tree-common"></ul></section>
    </aside>

    <div id="viewer">
      <div id="page-nav">
        <button id="prev" type="button">◀</button>
        <span id="page-label">page —</span>
        <button id="next" type="button">▶</button>
      </div>
      <div id="page-stage">
        <img id="page-img" alt="page">
        <div id="overlays"></div>
      </div>
    </div>
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
